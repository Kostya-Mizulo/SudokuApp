<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>Судоку — иконка приложения</title>

  <defs>
    <clipPath id="icon-clip">
      <rect x="72" y="72" width="880" height="880" rx="176"/>
    </clipPath>
  </defs>

  <rect x="72" y="72" width="880" height="880" rx="176" fill="#ffffff"/>

  <g clip-path="url(#icon-clip)">
    <!-- Row 0 -->
    <rect x="72"  y="72"  width="294" height="294" fill="#2edbee"/>
    <rect x="366" y="72"  width="294" height="294" fill="#EEE9F6"/>
    <rect x="660" y="72"  width="292" height="294" fill="#2edbee"/>
    <!-- Row 1 -->
    <rect x="72"  y="366" width="294" height="294" fill="#EEE9F6"/>
    <rect x="366" y="366" width="294" height="294" fill="#2edbee"/>
    <rect x="660" y="366" width="292" height="294" fill="#EEE9F6"/>
    <!-- Row 2 -->
    <rect x="72"  y="660" width="294" height="292" fill="#2edbee"/>
    <rect x="366" y="660" width="294" height="292" fill="#EEE9F6"/>
    <rect x="660" y="660" width="292" height="292" fill="#2edbee"/>

    <!-- Letters -->
    <!-- Row 0: С У (col 0,1) -->
    <text x="213" y="271" font-family="Arial Black, Arial, sans-serif" font-size="160" font-weight="900" text-anchor="middle" fill="#2a1a4e">С</text>
    <text x="507" y="271" font-family="Arial Black, Arial, sans-serif" font-size="160" font-weight="900" text-anchor="middle" fill="#2a1a4e">У</text>
    <!-- Row 1: Д О (col 1,2) -->
    <text x="507" y="565" font-family="Arial Black, Arial, sans-serif" font-size="160" font-weight="900" text-anchor="middle" fill="#2a1a4e">Д</text>
    <text x="806" y="565" font-family="Arial Black, Arial, sans-serif" font-size="160" font-weight="900" text-anchor="middle" fill="#2a1a4e">О</text>
    <!-- Row 2: К У (col 0,1) -->
    <text x="213" y="864" font-family="Arial Black, Arial, sans-serif" font-size="160" font-weight="900" text-anchor="middle" fill="#2a1a4e">К</text>
    <text x="507" y="864" font-family="Arial Black, Arial, sans-serif" font-size="160" font-weight="900" text-anchor="middle" fill="#2a1a4e">У</text>

    <!-- Grid lines -->
    <rect x="72"  y="354" width="880" height="12" fill="#000000"/>
    <rect x="72"  y="648" width="880" height="12" fill="#000000"/>
    <rect x="354" y="72"  width="12" height="880" fill="#000000"/>
    <rect x="648" y="72"  width="12" height="880" fill="#000000"/>
  </g>

  <rect x="72" y="72" width="880" height="880" rx="176" fill="none" stroke="#000000" stroke-width="12"/>
</svg>
